worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
    client_max_body_size 25M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ──────────────────────────────────────
    # Upstream definitions
    # ──────────────────────────────────────
    upstream api {
        server backend:5000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    upstream admin {
        server admin:80;
        keepalive 16;
    }

    # ──────────────────────────────────────
    # Health check endpoint
    # ──────────────────────────────────────
    server {
        listen 80 default_server;
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }

    # ──────────────────────────────────────
    # Main site — alwid.com
    # ──────────────────────────────────────
    server {
        listen 80;
        server_name alwid.com www.alwid.com localhost;

        # Redirect www → non-www
        if ($host = www.alwid.com) {
            return 301 $scheme://alwid.com$request_uri;
        }

        # API proxy
        location /api/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;

            # Rate limiting for API
            limit_req zone=api burst=50 nodelay;
        }

        # Static files from Next.js (_next/static)
        location /_next/static/ {
            proxy_pass http://frontend;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, immutable, max-age=31536000";
        }

        # Next.js app
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 60s;
        }
    }

    # ──────────────────────────────────────
    # Admin dashboard — admin.alwid.com
    # ──────────────────────────────────────
    server {
        listen 80;
        server_name admin.alwid.com;

        # Only allow known IPs (optional hardening)
        # allow 1.2.3.4;
        # deny all;

        location /api/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location / {
            proxy_pass http://admin;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SPA fallback — serve index.html for all routes
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf)$ {
            proxy_pass http://admin;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # ──────────────────────────────────────
    # Rate limiting zones
    # ──────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
}
